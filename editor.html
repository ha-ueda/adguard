<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>AdGuard フィルタ編集</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #a5b4fc;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --border: #334155;
            --border-focus: #6366f1;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --text-label: #cbd5e1;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
            --radius: 10px;
            --transition: 0.2s ease;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--text);
            overscroll-behavior-y: contain;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            padding: 0 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            width: 28px;
            height: 28px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        header h1 {
            font-size: 16px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.02em;
        }

        /* ── Layout ── */
        .layout {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 16px 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── Card ── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        /* ── Settings Panel (collapsible) ── */
        .settings-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            cursor: pointer;
            user-select: none;
            background: none;
            border: none;
            color: var(--text);
            width: 100%;
            font-size: 14px;
            font-weight: 600;
        }

        .settings-toggle:hover {
            background: rgba(99, 102, 241, 0.06);
        }

        .settings-toggle svg {
            width: 18px;
            height: 18px;
            fill: var(--text-muted);
            transition: transform var(--transition);
        }

        .settings-toggle[aria-expanded="true"] svg {
            transform: rotate(180deg);
        }

        .settings-body {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease;
        }

        .settings-body.open {
            grid-template-rows: 1fr;
        }

        .settings-inner {
            overflow: hidden;
        }

        .settings-fields {
            padding: 0 18px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .field-row {
            display: flex;
            gap: 12px;
        }

        .field-row>.field-group {
            flex: 1;
        }

        /* ── Form Elements ── */
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            padding: 10px 12px;
            font-size: 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
            font-family: inherit;
        }

        input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* ── Editor Area ── */
        .editor-card {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .editor-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 18px;
            border-bottom: 1px solid var(--border);
        }

        .editor-toolbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background var(--transition);
        }

        .file-indicator.loaded {
            background: var(--success);
        }

        .file-indicator.error {
            background: var(--error);
        }

        .editor-filename {
            font-size: 13px;
            color: var(--text-muted);
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
        }

        .line-count {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.7;
        }

        textarea {
            width: 100%;
            min-height: 420px;
            padding: 16px 18px;
            font-size: 13px;
            line-height: 1.7;
            font-family: "SF Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
            border: none;
            background: var(--bg-input);
            color: var(--text);
            outline: none;
            resize: vertical;
            white-space: pre;
            tab-size: 4;
        }

        textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.4;
        }

        /* ── Buttons ── */
        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
        }

        .btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #283548;
            border-color: var(--text-muted);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(16px);
            border: 1px solid transparent;
            animation: toast-in 0.3s ease, toast-out 0.3s ease 2.7s forwards;
            pointer-events: auto;
            max-width: 90vw;
            text-align: center;
        }

        .toast.success {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
            border-color: rgba(34, 197, 94, 0.3);
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.15);
            color: var(--error);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .toast.info {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
            border-color: rgba(99, 102, 241, 0.3);
        }

        @keyframes toast-in {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes toast-out {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-8px);
            }
        }

        /* ── Spinner ── */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        .btn.loading .spinner {
            display: block;
        }

        .btn.loading .btn-icon {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Responsive ── */
        @media (max-width: 500px) {
            .field-row {
                flex-direction: column;
                gap: 14px;
            }

            .actions {
                flex-direction: column;
            }

            textarea {
                min-height: 320px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <div class="header-logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18l7 3.5v7.64l-7 3.5-7-3.5V7.68l7-3.5z" />
                </svg>
            </div>
            <h1>AdGuard Filter Editor</h1>
        </div>
    </header>

    <main class="layout">

        <!-- Settings Card -->
        <div class="card">
            <button class="settings-toggle" aria-expanded="true" onclick="toggleSettings()">
                <span>Settings</span>
                <svg viewBox="0 0 24 24">
                    <path d="M7 10l5 5 5-5z" />
                </svg>
            </button>
            <div class="settings-body open" id="settingsBody">
                <div class="settings-inner">
                    <div class="settings-fields">
                        <div class="field-group">
                            <label for="token">GitHub Token</label>
                            <input id="token" type="password" autocomplete="current-password"
                                placeholder="ghp_xxxxxxxxxxxx">
                        </div>
                        <div class="field-row">
                            <div class="field-group">
                                <label for="repo">Repository</label>
                                <input id="repo" placeholder="username/repo">
                            </div>
                            <div class="field-group">
                                <label for="path">File Path</label>
                                <input id="path" value="user_filter.txt" placeholder="path/to/file.txt">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Editor Card -->
        <div class="card editor-card">
            <div class="editor-toolbar">
                <div class="editor-toolbar-left">
                    <div class="file-indicator" id="fileIndicator"></div>
                    <span class="editor-filename" id="editorFilename">no file loaded</span>
                </div>
                <span class="line-count" id="lineCount"></span>
            </div>
            <textarea id="content" placeholder="Load a file to start editing..."
                oninput="updateLineCount(); window.isDirty = true;"></textarea>
        </div>

        <!-- Actions -->
        <div class="actions">
            <button class="btn btn-secondary" id="loadBtn" onclick="loadFile()">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" />
                </svg>
                <span class="spinner"></span>
                Load
            </button>
            <button class="btn btn-primary" id="saveBtn" onclick="saveFile()">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V7l-4-4z" />
                    <path d="M7 3v5h8V3M7 14h10" />
                </svg>
                <span class="spinner"></span>
                Save
            </button>
        </div>

    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const $ = (id) => document.getElementById(id);
        const loadBtn = $("loadBtn");
        const saveBtn = $("saveBtn");

        // ── Toast notifications ──
        function showToast(message, type = "info") {
            const container = $("toastContainer");
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ── Settings panel toggle ──
        function toggleSettings() {
            const btn = document.querySelector(".settings-toggle");
            const body = $("settingsBody");
            const expanded = btn.getAttribute("aria-expanded") === "true";
            btn.setAttribute("aria-expanded", !expanded);
            body.classList.toggle("open");
        }

        // ── Line count ──
        function updateLineCount() {
            const text = $("content").value;
            const lines = text ? text.split("\n").length : 0;
            $("lineCount").textContent = lines > 0 ? `${lines} lines` : "";
        }

        // ── File indicator ──
        function setIndicator(state) {
            const el = $("fileIndicator");
            el.className = "file-indicator";
            if (state) el.classList.add(state);
        }

        // ── Restore settings from localStorage (token is never persisted) ──
        (function restoreSettings() {
            const saved = localStorage.getItem("adguard_editor_settings");
            if (!saved) return;
            try {
                const s = JSON.parse(saved);
                if (s.repo) $("repo").value = s.repo;
                if (s.path) $("path").value = s.path;
            } catch (_) { /* ignore */ }
            // Remove legacy token if previously stored
            try {
                const s = JSON.parse(saved);
                if (s.token) {
                    delete s.token;
                    localStorage.setItem("adguard_editor_settings", JSON.stringify(s));
                }
            } catch (_) { /* ignore */ }
        })();

        function persistSettings() {
            localStorage.setItem("adguard_editor_settings", JSON.stringify({
                repo: $("repo").value.trim(),
                path: $("path").value.trim()
            }));
        }

        // ── Dirty state tracking ──
        window.isDirty = false;

        window.addEventListener("beforeunload", function (e) {
            if (window.isDirty) {
                e.preventDefault();
            }
        });

        // ── Loaded file identity (to prevent save to wrong file) ──
        window.loadedRepo = null;
        window.loadedPath = null;

        $("repo").addEventListener("input", function () {
            if (window.fileSha && this.value.trim() !== window.loadedRepo) {
                window.fileSha = null;
            }
        });

        $("path").addEventListener("input", function () {
            if (window.fileSha && this.value.trim() !== window.loadedPath) {
                window.fileSha = null;
            }
        });

        // ── Base64 helpers ──
        function encodeBase64UTF8(text) {
            const bytes = new TextEncoder().encode(text);
            let binary = "";
            bytes.forEach(b => binary += String.fromCharCode(b));
            return btoa(binary);
        }

        function decodeBase64UTF8(base64) {
            const cleaned = base64.replace(/\s/g, "");
            const binary = atob(cleaned);
            const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
            return new TextDecoder("utf-8").decode(bytes);
        }

        // ── Input helpers ──
        function getInputs() {
            return {
                repo: $("repo").value.trim(),
                path: $("path").value.trim(),
                token: $("token").value.trim()
            };
        }

        function validateInputs({ repo, path, token }) {
            if (!repo || !path || !token) {
                showToast("Token / Repository / File Path を入力してください", "error");
                return false;
            }
            if (!/^[a-zA-Z0-9._-]+\/[a-zA-Z0-9._-]+$/.test(repo)) {
                showToast("Repository の形式が不正です (例: username/repo)", "error");
                return false;
            }
            return true;
        }

        function buildApiUrl(repo, path) {
            const [owner, name] = repo.split("/");
            const encodedPath = path.split("/").map(encodeURIComponent).join("/");
            return `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(name)}/contents/${encodedPath}`;
        }

        // ── Load ──
        async function loadFile() {
            const inputs = getInputs();
            if (!validateInputs(inputs)) return;

            if (window.isDirty && !confirm("未保存の変更があります。読み込み直しますか？")) {
                return;
            }

            loadBtn.disabled = true;
            loadBtn.classList.add("loading");
            setIndicator("");

            try {
                const res = await fetch(buildApiUrl(inputs.repo, inputs.path), {
                    headers: { Authorization: `token ${inputs.token}` }
                });

                if (!res.ok) {
                    showToast(`読み込みエラー: HTTP ${res.status}`, "error");
                    setIndicator("error");
                    return;
                }

                const data = await res.json();

                if (!data.content) {
                    showToast("GitHub のレスポンスに content がありません", "error");
                    setIndicator("error");
                    return;
                }

                $("content").value = decodeBase64UTF8(data.content);
                $("editorFilename").textContent = inputs.path;
                window.fileSha = data.sha;
                window.loadedRepo = inputs.repo;
                window.loadedPath = inputs.path;
                window.isDirty = false;
                setIndicator("loaded");
                updateLineCount();
                persistSettings();
                showToast("ファイルを読み込みました", "success");

                // Auto-collapse settings after successful load
                const btn = document.querySelector(".settings-toggle");
                if (btn.getAttribute("aria-expanded") === "true") {
                    toggleSettings();
                }
            } catch (e) {
                console.error(e);
                showToast("読み込み中にエラーが発生しました", "error");
                setIndicator("error");
            } finally {
                loadBtn.disabled = false;
                loadBtn.classList.remove("loading");
            }
        }

        // ── Save ──
        async function saveFile() {
            const inputs = getInputs();
            if (!validateInputs(inputs)) return;

            if (!window.fileSha) {
                showToast("先にファイルを読み込んでください", "error");
                return;
            }

            saveBtn.disabled = true;
            saveBtn.classList.add("loading");

            try {
                const res = await fetch(buildApiUrl(inputs.repo, inputs.path), {
                    method: "PUT",
                    headers: {
                        Authorization: `token ${inputs.token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "update adguard filter",
                        content: encodeBase64UTF8($("content").value),
                        sha: window.fileSha
                    })
                });

                if (res.status === 200 || res.status === 201) {
                    const data = await res.json();
                    window.fileSha = data.content.sha;
                    window.isDirty = false;
                    showToast("保存が完了しました", "success");
                    persistSettings();
                } else {
                    showToast(`保存エラー: HTTP ${res.status}`, "error");
                }
            } catch (e) {
                console.error(e);
                showToast("保存中にエラーが発生しました", "error");
            } finally {
                saveBtn.disabled = false;
                saveBtn.classList.remove("loading");
            }
        }
    </script>

</body>

</html>
